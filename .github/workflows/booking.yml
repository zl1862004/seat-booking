name: 每日座位预约

on:
  schedule:
    # 主力：每天 00:01 北京时间 (UTC 16:01 前一天)
    - cron: '1 16 * * *'
    # 备用1：00:03 北京时间
    - cron: '3 16 * * *'
    # 备用2：00:05 北京时间
    - cron: '5 16 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  book-seat:
    runs-on: ubuntu-latest
    # 防止同一时间重复执行（如果上一次还没跑完）
    concurrency:
      group: seat-booking
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run booking script
        id: booking
        run: |
          python main.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check result
        if: failure()
        run: echo "::error::座位预约失败，请检查！"

  # 自保活：保持仓库活跃，防止 GitHub 禁用 Actions
  keepalive:
    runs-on: ubuntu-latest
    if: always()
    needs: book-seat
    steps:
      - name: Keep repo alive
        uses: actions/checkout@v4
      - name: Touch timestamp
        run: |
          date > .last-run
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-run
          git diff --cached --quiet || git commit -m "keepalive: $(date +%Y-%m-%d)"
          git push
