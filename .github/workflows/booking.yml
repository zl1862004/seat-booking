name: 每日座位预约

on:
  schedule:
    # 每天 00:01 北京时间 (UTC 16:01 前一天)
    - cron: '1 16 * * *'
    # 备用：00:05 北京时间
    - cron: '5 16 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  book-seat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run booking script
        run: python main.py

      - name: Check result
        if: failure()
        run: echo "::error::座位预约失败，请检查！"
