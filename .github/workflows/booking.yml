name: 每日座位预约

on:
  schedule:
    # 主力：每天 00:01 北京时间 (UTC 16:01)
    - cron: '1 16 * * *'
    # 备用1：00:03
    - cron: '3 16 * * *'
    # 备用2：00:05
    - cron: '5 16 * * *'
  workflow_dispatch:

jobs:
  book-seat:
    runs-on: ubuntu-latest
    concurrency:
      group: seat-booking
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run booking script
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_NAME: ${{ secrets.STU_NAME }}
        run: python main.py
