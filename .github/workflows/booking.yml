name: 每日座位预约

on:
  schedule:
    - cron: '1 16 * * *'
  workflow_dispatch:

jobs:
  book-seat:
    runs-on: ubuntu-latest
    concurrency:
      group: seat-booking
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run booking script (无依赖，直接跑)
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_NAME: ${{ secrets.STU_NAME }}
        run: python3 main.py
