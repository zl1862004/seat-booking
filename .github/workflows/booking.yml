name: 每日座位预约

on:
  schedule:
    # GitHub cron 仅作保底（UTC 15:50 = 北京 23:50）
    # 延迟约1-2h，抢不到24座，但能拿fallback
    - cron: '50 15 * * *'
  workflow_dispatch:

jobs:
  book-seat:
    runs-on: ubuntu-latest
    concurrency:
      group: seat-booking
      cancel-in-progress: false
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run booking script (零点秒发版)
        env:
          STU_ID: ${{ secrets.STU_ID }}
          STU_NAME: ${{ secrets.STU_NAME }}
        run: python3 main.py
